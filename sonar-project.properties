# ── Project identity ──────────────────────────────────────────────────────────
sonar.projectKey=Kirian-snx_ynov-ecommerce
sonar.projectName=ecommerce-api
sonar.organization=kirian-snx

# ── Sources & tests ───────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests

# ── Coverage ──────────────────────────────────────────────────────────────────
# Points to the lcov report uploaded as a GitHub artifact and downloaded
# in the sonarcloud CI job before this action runs.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ────────────────────────────────────────────────────────────────
# Mirror the jest.config.mjs collectCoverageFrom exclusions so SonarCloud
# doesn't flag untested files that are intentionally outside scope.
sonar.exclusions=src/index.js,src/data/**,src/db/seed.js
